apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-openvino-runtime
  namespace: vllm
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: quay.io/joopark/vllm-openvino:latest
      imagePullPolicy: Always
      command: ["/bin/sh", "-c"]
      args:
         - |
           exec python3 -m vllm.entrypoints.openai.api_server \
            --model=/models/Phi-4-mini-instruct-int4-ov \
            --served-model-name=Phi-4-mini-instruct-int4-ov \
            --port=8080 \
            --max-num-seqs=${MAX_NUM_SEQS:-64} \
            --max-model-len=${MAX_MODEL_LEN:-8192} \
            --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.90} \
            ${ENABLE_CHUNKED_PREFILL:+"--enable-chunked-prefill"}
      envFrom:
        - configMapRef:
            name: vllm-config
      env:
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: VLLM_OPENVINO_DEVICE
          value: "CPU"
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: model-pvc
