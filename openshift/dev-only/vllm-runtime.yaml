apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-openvino-runtime
  namespace: vllm
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: quay.io/joopark/vllm-openvino:latest
      imagePullPolicy: Always
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
      env:
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: VLLM_OPENVINO_DEVICE
          value: "CPU"
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: models
          mountPath: /models
  volumes:
    - name: models
      persistentVolumeClaim:
        claimName: model-pvc
