apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm-lab-dev
resources:
  - ../base
patches:
  - target:
      kind: Role
      name: vllm-optimizer-backend-role
    patch: |
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: vllm-optimizer-backend-role
        namespace: vllm-lab-dev
  - target:
      kind: RoleBinding
      name: vllm-optimizer-backend-rb
    patch: |
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: vllm-optimizer-backend-rb
        namespace: vllm-lab-dev
      subjects:
      - kind: ServiceAccount
        name: vllm-optimizer-backend
        namespace: vllm-optimizer-dev
  - target:
      kind: NetworkPolicy
      name: vllm-networkpolicy
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: vllm-networkpolicy
        namespace: vllm-lab-dev
      spec:
        ingress:
        - from:
          - podSelector: {}
          - namespaceSelector:
              matchLabels:
                network.openshift.io/policy-group: ingress
          - namespaceSelector:
              matchLabels:
                network.openshift.io/policy-group: monitoring
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: openshift-kube-apiserver
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: vllm-optimizer-dev
            podSelector:
              matchLabels:
                app: vllm-optimizer-backend
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: openshift-lightspeed
  - target:
      kind: InferenceService
      name: llm-ov
    patch: |
      apiVersion: serving.kserve.io/v1beta1
      kind: InferenceService
      metadata:
        name: llm-ov
      spec:
        predictor:
          model:
            args:
              - --served-model-name=OpenVINO/Phi-4-mini-instruct-int4-ov
              - --max-num-seqs=256
              - --gpu-memory-utilization=0.90
              - --max-model-len=8192
              - --max-num-batched-tokens=2048
