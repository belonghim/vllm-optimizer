apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vllm-optimizer
spec:
  groups:
  - name: vllm-optimizer.rules
    rules:
    - alert: VLLMHighErrorRate
      expr: rate(vllm_errors_total[5m]) > 0.1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: High error rate in vLLM optimizer
        description: Error rate is {{ $value }} errors/second
    - alert: VLLMHighLatency
      expr: histogram_quantile(0.95, rate(vllm_request_duration_seconds_bucket[5m])) > 1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: High latency in vLLM optimizer
        description: 95th percentile latency is {{ $value }} seconds