# Kustomize patches for dev overlay
# Patches backend and frontend image references to dev tags

patches:
- target:
    kind: Deployment
    name: vllm-optimizer-backend
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: quay.io/joopark/vllm-optimizer-backend:dev
- target:
    kind: Deployment
    name: vllm-optimizer-frontend
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: quay.io/joopark/vllm-optimizer-frontend:dev
- target:
    kind: Deployment
    name: vllm-optimizer-backend
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: quay.io/joopark/vllm-optimizer-backend:dev
- target:
    kind: Deployment
    name: vllm-optimizer-frontend
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: quay.io/joopark/vllm-optimizer-frontend:dev