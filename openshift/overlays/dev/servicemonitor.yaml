apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-optimizer-backend
  labels:
    app.kubernetes.io/name: vllm-optimizer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-optimizer
  endpoints:
  - port: http
    path: /api/metrics
    interval: 15s
    scrapeTimeout: 10s
    scheme: http