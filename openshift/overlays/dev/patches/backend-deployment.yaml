apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-optimizer-backend
  namespace: vllm-optimizer-dev
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: backend
        image: quay.io/joopark/vllm-optimizer-backend:dev
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"