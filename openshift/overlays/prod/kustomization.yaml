apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm-optimizer
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: vllm-optimizer-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: vllm-optimizer-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Route
      name: vllm-optimizer
    patch: |-
      - op: replace
        path: /spec/host
        value: vllm-optimizer.apps.cluster.example.com
configMapGenerator:
  - name: vllm-optimizer-backend-config
    behavior: merge
    literals:
      - LOG_LEVEL=warning
images:
  - name: image-registry.openshift-image-registry.svc:5000/vllm-optimizer/vllm-optimizer-backend
    newTag: "1.0.0"
  - name: image-registry.openshift-image-registry.svc:5000/vllm-optimizer/vllm-optimizer-frontend
    newTag: "1.0.0"
