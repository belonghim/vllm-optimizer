# ═══════════════════════════════════════════════════════════════════════════════
# tekton/pipeline.yaml
# OpenShift Pipelines (Tekton) — 빌드 → 테스트 → 이미지 푸시 → 배포
# ═══════════════════════════════════════════════════════════════════════════════

# ── Pipeline ──────────────────────────────────────────────────────────────────
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vllm-optimizer-pipeline
  namespace: vllm-optimizer
  labels:
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  params:
    - name: git-url
      type: string
      default: "https://github.com/your-org/vllm-optimizer.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-registry
      type: string
      default: "quay.io/your-org"
    - name: image-tag
      type: string
      default: "latest"
    - name: deploy-env
      type: string
      default: "dev"
      description: "배포 환경: dev | prod"

  workspaces:
    - name: source-code
    - name: docker-credentials
      description: "Quay.io 인증 시크릿"

  tasks:
    # ── 1. Git Clone ───────────────────────────────────────────────────────────
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: Task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source-code

     # ── 2. Python 테스트 ───────────────────────────────────────────────────────
    - name: test-backend
      runAfter: ["git-clone"]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: Task
          - name: name
            value: python-test
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SOURCE_PATH
          value: "backend"
        - name: REQUIREMENTS_FILE
          value: "backend/requirements.txt"
      workspaces:
        - name: source
          workspace: source-code

    # ── 3. Backend Type Check (basedpyright) ───────────────────────────────────
    - name: typecheck-backend
      runAfter: ["git-clone"]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: basedpyright-check
            image: registry.access.redhat.com/ubi9/python-311:latest
            workingDir: $(workspaces.source.path)
            script: |
              #!/bin/bash
              set -euo pipefail
              echo "=== Installing basedpyright ==="
              pip install basedpyright==1.9.0 --quiet
              echo "=== Running basedpyright on backend/ ==="
              basedpyright backend/
              echo "✓ Type check passed"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              capabilities:
                drop: ["ALL"]
      workspaces:
        - name: source
          workspace: source-code

     # ── 4. Backend 이미지 빌드 & Quay.io 푸시 (Buildah) ──────────────────────
    - name: build-backend
      runAfter: ["typecheck-backend"]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: Task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "$(params.image-registry)/vllm-optimizer-backend:$(params.image-tag)"
        - name: DOCKERFILE
          value: "backend/Dockerfile"
        - name: CONTEXT
          value: "backend"
        # OpenShift SCC: Buildah를 non-root로 실행
        - name: STORAGE_DRIVER
          value: "vfs"
        - name: BUILD_EXTRA_ARGS
          value: "--security-opt=label=disable --security-opt=seccomp=unconfined"
        - name: PUSH_EXTRA_ARGS
          value: "--tls-verify=true"
      workspaces:
        - name: source
          workspace: source-code
        - name: dockerconfig
          workspace: docker-credentials

    # ── 4. Frontend 이미지 빌드 & 푸시 ────────────────────────────────────────
    - name: build-frontend
      runAfter: ["git-clone"]  # 테스트와 병렬 실행
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: Task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "$(params.image-registry)/vllm-optimizer-frontend:$(params.image-tag)"
        - name: DOCKERFILE
          value: "frontend/Dockerfile"
        - name: CONTEXT
          value: "frontend"
        - name: STORAGE_DRIVER
          value: "vfs"
      workspaces:
        - name: source
          workspace: source-code
        - name: dockerconfig
          workspace: docker-credentials

    # ── 5a. Backend 이미지 보안 스캔 (Trivy) ───────────────────────────────────
    - name: scan-backend
      runAfter: ["build-backend"]
      taskRef:
        kind: Task
        name: trivy-image-scan
      params:
        - name: IMAGE
          value: "$(params.image-registry)/vllm-optimizer-backend:$(params.image-tag)"

    # ── 5b. Frontend 이미지 보안 스캔 (Trivy) ──────────────────────────────────
    - name: scan-frontend
      runAfter: ["build-frontend"]
      taskRef:
        kind: Task
        name: trivy-image-scan
      params:
        - name: IMAGE
          value: "$(params.image-registry)/vllm-optimizer-frontend:$(params.image-tag)"

    # ── 6. Kustomize 배포 ─────────────────────────────────────────────────────
    - name: deploy
      runAfter: ["scan-backend", "scan-frontend"]
      taskRef:
        kind: Task
        name: kustomize-deploy
      params:
        - name: OVERLAY_PATH
          value: "openshift/overlays/$(params.deploy-env)"
        - name: NAMESPACE
          value: "vllm-optimizer-$(params.deploy-env)"
      workspaces:
        - name: source
          workspace: source-code

    # ── 7. 배포 검증 ──────────────────────────────────────────────────────────
    - name: verify-deployment
      runAfter: ["deploy"]
      taskRef:
        kind: Task
        name: verify-rollout
      params:
        - name: NAMESPACE
          value: "vllm-optimizer-$(params.deploy-env)"
        - name: DEPLOYMENTS
          value: "vllm-optimizer-backend,vllm-optimizer-frontend"
        - name: TIMEOUT
          value: "5m"

---
# ── Task: Kustomize 배포 ───────────────────────────────────────────────────────
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kustomize-deploy
  namespace: vllm-optimizer
spec:
  params:
    - name: OVERLAY_PATH
      type: string
    - name: NAMESPACE
      type: string
  workspaces:
    - name: source
  steps:
    - name: kustomize-apply
      image: registry.redhat.io/openshift4/ose-cli:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        cd $(workspaces.source.path)

        echo "=== Kustomize 빌드: $(params.OVERLAY_PATH) ==="
        oc kustomize $(params.OVERLAY_PATH) | \
          oc apply -n $(params.NAMESPACE) -f -

        echo "=== 배포 상태 확인 ==="
        oc rollout status deployment/vllm-optimizer-backend \
          -n $(params.NAMESPACE) --timeout=5m
        oc rollout status deployment/vllm-optimizer-frontend \
          -n $(params.NAMESPACE) --timeout=5m

        echo "✓ 배포 완료"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]

---
# ── Task: 배포 검증 ────────────────────────────────────────────────────────────
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-rollout
  namespace: vllm-optimizer
spec:
  params:
    - name: NAMESPACE
      type: string
    - name: DEPLOYMENTS
      type: string
    - name: TIMEOUT
      type: string
      default: "5m"
  steps:
    - name: verify
      image: registry.redhat.io/openshift4/ose-cli:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        IFS=',' read -ra DEPS <<< "$(params.DEPLOYMENTS)"
        for dep in "${DEPS[@]}"; do
          echo "=== 검증: $dep ==="
          oc rollout status deployment/$dep \
            -n $(params.NAMESPACE) --timeout=$(params.TIMEOUT)
          READY=$(oc get deployment/$dep -n $(params.NAMESPACE) \
            -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(oc get deployment/$dep -n $(params.NAMESPACE) \
            -o jsonpath='{.spec.replicas}')
          echo "Ready: $READY / $DESIRED"
          [ "$READY" = "$DESIRED" ] && echo "✓ $dep OK" || (echo "✗ $dep 비정상" && exit 1)
        done

        # Route 접근 검증
        ROUTE=$(oc get route vllm-optimizer -n $(params.NAMESPACE) \
          -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
        if [ -n "$ROUTE" ]; then
          echo "=== Route 헬스체크: https://$ROUTE/health ==="
          curl -sf --max-time 10 "https://$ROUTE/health" && echo "✓ Route OK"
        fi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]

---
# ── Task: Trivy 이미지 보안 스캔 ────────────────────────────────────────────────
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image-scan
  namespace: vllm-optimizer
spec:
  params:
    - name: IMAGE
      type: string
      description: "스캔 대상 이미지 (registry/repo:tag)"
    - name: SEVERITY
      type: string
      default: "CRITICAL,HIGH"
      description: "실패 기준 심각도 (쉼표 구분)"
    - name: SKIP_DB_UPDATE
      type: string
      default: "false"
      description: "Air-gapped 환경에서 DB 업데이트 건너뛰기 (true/false)"
  steps:
    - name: trivy-scan
      image: registry.access.redhat.com/ubi9-minimal:latest
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "=== Trivy 설치 ==="
        microdnf install -y tar gzip && microdnf clean all
        TRIVY_VERSION="0.58.2"
        curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
          | tar xz -C /usr/local/bin trivy

        echo "=== 이미지 스캔: $(params.IMAGE) ==="
        SCAN_ARGS="--exit-code 1 --severity $(params.SEVERITY) --no-progress"
        if [ "$(params.SKIP_DB_UPDATE)" = "true" ]; then
          SCAN_ARGS="$SCAN_ARGS --skip-db-update"
          echo "⚠ Air-gapped 모드: DB 업데이트 건너뜀"
        fi

        trivy image $SCAN_ARGS "$(params.IMAGE)"

        echo "✓ 스캔 통과 — CRITICAL/HIGH 취약점 없음"
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]

---
# ── PipelineRun 템플릿 (트리거용) ─────────────────────────────────────────────
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: vllm-optimizer-run-
  namespace: vllm-optimizer
  labels:
    app.kubernetes.io/part-of: vllm-optimizer
    tekton.dev/pipeline: vllm-optimizer-pipeline
spec:
  pipelineRef:
    name: vllm-optimizer-pipeline
  params:
    - name: git-revision
      value: "main"
    - name: image-tag
      value: "latest"
    - name: deploy-env
      value: "dev"
  workspaces:
    - name: source-code
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    - name: docker-credentials
      secret:
        secretName: quay-push-secret

---
# ── EventListener: GitHub Webhook → Pipeline 자동 트리거 ─────────────────────
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: vllm-optimizer-listener
  namespace: vllm-optimizer
spec:
  serviceAccountName: vllm-optimizer-backend
  triggers:
    - name: github-push-main
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: token
            - name: eventTypes
              value: ["push"]
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/main'"
      template:
        spec:
          params:
            - name: git-revision
              default: "main"
            - name: image-tag
              default: "latest"
          resourcetemplates:
            - apiVersion: tekton.dev/v1
              kind: PipelineRun
              metadata:
                generateName: vllm-optimizer-run-
              spec:
                pipelineRef:
                  name: vllm-optimizer-pipeline
                params:
                  - name: git-revision
                    value: $(tt.params.git-revision)
                  - name: image-tag
                    value: $(tt.params.image-tag)
                  - name: deploy-env
                    value: dev
                workspaces:
                  - name: source-code
                    volumeClaimTemplate:
                      spec:
                        accessModes: ["ReadWriteOnce"]
                        resources:
                          requests:
                            storage: 1Gi
                  - name: docker-credentials
                    secret:
                      secretName: quay-push-secret
