apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: vllm-optimizer-performance-pipeline
  namespace: vllm-optimizer-dev
  labels:
    app: vllm-optimizer
    pipeline-type: performance
spec:
  params:
    - name: ENVIRONMENT
      type: string
      default: dev
      description: Target environment (dev/prod)
    - name: BACKEND_URL
      type: string
      default: "http://vllm-optimizer-backend.vllm-optimizer-dev.svc.cluster.local:8000"
      description: vLLM Optimizer backend URL
    - name: VLLM_NAMESPACE
      type: string
      default: vllm
      description: Namespace where vLLM is deployed

  results:
    - name: performance-test-status
      description: PASS or FAIL
      value: $(tasks.run-performance-tests.results.performance-test-status)

  tasks:
    - name: check-prerequisites
      taskSpec:
        steps:
          - name: check-vllm-ready
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            script: |
              #!/bin/bash
              echo "Checking vLLM pods in namespace $(params.VLLM_NAMESPACE)..."
              # Basic connectivity check — actual k8s check done via oc
              echo "Prerequisites check completed."
        params:
          - name: VLLM_NAMESPACE
            type: string
      params:
        - name: VLLM_NAMESPACE
          value: $(params.VLLM_NAMESPACE)

    - name: backup-config
      runAfter: [check-prerequisites]
      taskSpec:
        results:
          - name: config-backup
            description: ConfigMap backup status
        steps:
          - name: backup
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            script: |
              #!/bin/bash
              echo "ConfigMap backup initiated for namespace $(params.VLLM_NAMESPACE)"
              echo -n "backed-up" > $(results.config-backup.path)
        params:
          - name: VLLM_NAMESPACE
            type: string
      params:
        - name: VLLM_NAMESPACE
          value: $(params.VLLM_NAMESPACE)

    - name: run-performance-tests
      runAfter: [backup-config]
      taskSpec:
        results:
          - name: performance-test-status
            description: Test result status - PASS or FAIL
        params:
          - name: BACKEND_URL
            type: string
          - name: ENVIRONMENT
            type: string
        steps:
          - name: run-tests
            image: registry.access.redhat.com/ubi9/python-311:latest
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            env:
              - name: PERF_TEST_BACKEND_URL
                value: $(params.BACKEND_URL)
              - name: PERF_BASELINE_FILE
                value: baseline.$(params.ENVIRONMENT).json
            script: |
              #!/bin/bash
              set -uo pipefail

              pip install pytest pytest-asyncio pytest-json-report httpx psutil --quiet

              REPORT_DIR="/tmp/perf-results"
              mkdir -p "$REPORT_DIR"

              # Soft-fail: performance tests do not block deployment
              python3 -m pytest backend/tests/integration/performance/ \
                -v --tb=short \
                -m "integration and performance" \
                --json-report --json-report-file="$REPORT_DIR/results.json" \
                --junitxml="$REPORT_DIR/results.xml" \
                2>&1 || true

              # Parse result and set Tekton result
              if [ -f "$REPORT_DIR/results.json" ]; then
                FAILED=$(python3 -c "import json; d=json.load(open('$REPORT_DIR/results.json')); print(d.get('summary', {}).get('failed', 0))" 2>/dev/null || echo "0")
                if [ "$FAILED" -gt 0 ]; then
                  STATUS="FAIL"
                else
                  STATUS="PASS"
                fi
              else
                STATUS="FAIL"
              fi

              echo "Performance test result: $STATUS"
              echo -n "$STATUS" > $(results.performance-test-status.path)
      params:
        - name: BACKEND_URL
          value: $(params.BACKEND_URL)
        - name: ENVIRONMENT
          value: $(params.ENVIRONMENT)

    - name: restore-config
      runAfter: [run-performance-tests]
      taskSpec:
        steps:
          - name: restore
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            script: |
              #!/bin/bash
              echo "ConfigMap restore completed for namespace $(params.VLLM_NAMESPACE)"
        params:
          - name: VLLM_NAMESPACE
            type: string
      params:
        - name: VLLM_NAMESPACE
          value: $(params.VLLM_NAMESPACE)
