apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-optimizer-config
data:
  K8S_NAMESPACE: "vllm-lab-dev"
  K8S_DEPLOYMENT_NAME: "llm-ov-predictor"
  VLLM_ENDPOINT: "http://llm-ov-predictor.vllm-lab-dev.svc.cluster.local:8080"
  VLLM_DEPLOYMENT_NAME: "llm-ov"
  # OpenShift Monitoring Stack — Thanos Querier
  PROMETHEUS_URL: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
  PROMETHEUS_USE_TLS: "true"
  PROMETHEUS_TOKEN_PATH: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  PROMETHEUS_CA_PATH: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  METRICS_INTERVAL_SEC: "2"
  # SQLite storage path (PVC mount point)
  STORAGE_PATH: "/data/app.db"
  # Optuna RDBStorage URL for persistent study across restarts
  OPTUNA_STORAGE_URL: "sqlite:////data/optuna.db"
  # vLLM CR type (inferenceservice or pod)
  VLLM_CR_TYPE: "inferenceservice"
---
apiVersion: v1
kind: Secret
metadata:
  name: quay-pull-secret
type: kubernetes.io/dockerconfigjson
data:
  # PLACEHOLDER — oc create secret docker-registry 로 교체 필요
  .dockerconfigjson: eyJhdXRocyI6eyJxdWF5LmlvIjp7InVzZXJuYW1lIjoiUExBQ0VIT0xERVIiLCJwYXNzd29yZCI6IlBMQUNFSE9MREVSIn19fQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: vllm-optimizer-secret
type: Opaque
stringData:
  VLLM_API_KEY: ""
  # ⚠️  WARNING: Replace this value with a cryptographically random secret in production.
  # ⚠️  Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth-proxy-cookie-secret
type: Opaque
data:
  # 16바이트 랜덤 시크릿 (AES-128 암호화용)
  # 프로덕션에서는 반드시 교체: dd if=/dev/urandom bs=16 count=1 | base64
  cookie-secret: 6CG06aAcaIOgTsd/dmyfFw==