apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm-optimizer-dev
resources:
  - 01-namespace-rbac.yaml
  - 02-config.yaml
  - 03-backend.yaml
  - 04-frontend.yaml
  - 05-monitoring.yaml
  - 06-imagestream.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: vllm-optimizer
patches:
  - target:
      kind: Namespace
    patch: |-
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
