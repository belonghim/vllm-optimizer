# ═══════════════════════════════════════════════════════════════════════════════
# 06-imagestream.yaml
# OpenShift ImageStream — 이미지 버전 추적 및 자동 배포 트리거
# ═══════════════════════════════════════════════════════════════════════════════

# ── Backend ImageStream ────────────────────────────────────────────────────────
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: vllm-optimizer-backend
  namespace: vllm-optimizer
  labels:
    app.kubernetes.io/name: vllm-optimizer-backend
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  # Quay.io에서 이미지 태그 변경 시 자동 감지
  lookupPolicy:
    local: true
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/joopark/vllm-optimizer-backend:latest
      importPolicy:
        # 이미지 변경 시 자동으로 Deployment 롤링 업데이트
        scheduled: true
        importMode: PreserveOriginal
      referencePolicy:
        type: Local

---
# ── Frontend ImageStream ───────────────────────────────────────────────────────
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: vllm-optimizer-frontend
  namespace: vllm-optimizer
  labels:
    app.kubernetes.io/name: vllm-optimizer-frontend
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  lookupPolicy:
    local: true
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/joopark/vllm-optimizer-frontend:latest
      importPolicy:
        scheduled: true
        importMode: PreserveOriginal
      referencePolicy:
        type: Local

---
