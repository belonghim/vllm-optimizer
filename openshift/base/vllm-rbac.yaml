apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-optimizer-backend-role
  namespace: vllm
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vllm-optimizer-backend-rb
  namespace: vllm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vllm-optimizer-backend-role
subjects:
  - kind: ServiceAccount
    name: vllm-optimizer-backend
    namespace: vllm-optimizer-dev
