# (Full content generated above in session)
---
apiVersion: v1
kind: Namespace
metadata:
  name: vllm-optimizer
  labels:
    openshift.io/cluster-monitoring: "true"
  annotations:
    openshift.io/display-name: "vLLM Optimizer"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-optimizer-backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-optimizer-frontend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vllm-optimizer-controller
rules:
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch","patch","update"]
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get","list","watch","patch","update"]
  - apiGroups: [""]
    resources: ["pods","pods/log","services","endpoints"]
    verbs: ["get","list","watch","patch","update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get","list","watch","patch","update"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vllm-optimizer-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vllm-optimizer-controller
subjects:
  - kind: ServiceAccount
    name: vllm-optimizer-backend
    namespace: "vllm-optimizer"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vllm-optimizer-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: vllm-optimizer-backend
    namespace: "vllm-optimizer"
---
# OpenShift SCC: non-root + arbitrary UID
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: vllm-optimizer-scc
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
runAsUser:
  type: MustRunAsNonRoot
supplementalGroups:
  type: MustRunAs
  ranges:
    - min: 1
      max: 65535
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1
      max: 65535
volumes: [configMap, emptyDir, secret, projected, persistentVolumeClaim]
allowHostNetwork: false
allowHostPorts: false
allowHostPID: false
allowHostIPC: false
readOnlyRootFilesystem: false
seLinuxContext:
  type: MustRunAs
seccompProfiles: ["runtime/default"]
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities: [ALL]
users:
  - system:serviceaccount:vllm-optimizer-${DEPLOY_ENV}:vllm-optimizer-backend
  - system:serviceaccount:vllm-optimizer-${DEPLOY_ENV}:vllm-optimizer-frontend
groups: []
