# ═══════════════════════════════════════════════════════════════════════════════
# 04-frontend.yaml
# Frontend Deployment + Service + OpenShift Route (TLS Edge Termination)
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-optimizer-frontend
  labels:
    app: vllm-optimizer-frontend
    app.kubernetes.io/name: vllm-optimizer-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: vllm-optimizer
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-optimizer-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vllm-optimizer-frontend
        app.kubernetes.io/name: vllm-optimizer-frontend
        app.kubernetes.io/part-of: vllm-optimizer
      annotations:
        # OpenShift가 이미지스트림 이름을 자동으로 해석하도록 설정
        alpha.image.policy.openshift.io/resolve-names: "*"
    spec:
      serviceAccountName: vllm-optimizer-frontend
      imagePullSecrets:
        - name: quay-pull-secret

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend
          image: quay.io/joopark/vllm-optimizer-frontend:dev
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "1Gi"

          volumeMounts:
            - name: tmp-nginx
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

        - name: oauth-proxy
          image: "oauth-proxy:v4.4"
          imagePullPolicy: IfNotPresent
          args:
            - -upstream=http://localhost:8080
            - -http-address=0.0.0.0:4180
            - -https-address=
            - -cookie-secret-file=/etc/oauth-proxy/cookie-secret
            - -openshift-service-account=vllm-optimizer-frontend
            - -provider=openshift
            - -upstream-flush=0s
            - -cookie-refresh=30m
            - -cookie-expire=24h
            - -email-domain=*
            - -skip-auth-regex=^/health$

          # OAuth Proxy도 readiness 체크 필요 - Service가 4180 포트를 사용하므로
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /oauth/healthz
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: proxy
              containerPort: 4180
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: cookie-secret
              mountPath: /etc/oauth-proxy
              readOnly: true
            - name: tmp-session
              mountPath: /tmp

      # DNS 설정: sdis.com 검색 도메인 제거 (OAuth TLS SNI 오류 해결)
      dnsConfig:
        searches:
          - vllm-optimizer-dev.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      dnsPolicy: ClusterFirst

      volumes:
        - name: tmp-nginx
          emptyDir:
            sizeLimit: 50Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 100Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 10Mi
        # OAuth Proxy: cookie-secret from Secret
        - name: cookie-secret
          secret:
            secretName: oauth-proxy-cookie-secret
            items:
              - key: cookie-secret
                path: cookie-secret
        # OAuth Proxy: /tmp session storage (readOnlyRootFilesystem compatibility)
        - name: tmp-session
          emptyDir:
            sizeLimit: 50Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vllm-optimizer-frontend
                topologyKey: kubernetes.io/hostname

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-optimizer-frontend
  labels:
    app.kubernetes.io/name: vllm-optimizer-frontend
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-optimizer-frontend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
---
# ── Frontend Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vllm-optimizer-frontend
  labels:
    app: vllm-optimizer-frontend
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  selector:
    app: vllm-optimizer-frontend
  ports:
    - name: http
      port: 8080
      targetPort: 4180
  type: ClusterIP

---
# ── OpenShift Route: Edge TLS Termination ─────────────────────────────────────
# OpenShift Router(HAProxy)가 TLS 종료 → HTTP로 Pod에 전달
# Kubernetes Ingress 대신 OpenShift 네이티브 Route 사용
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vllm-optimizer
  labels:
    app.kubernetes.io/name: vllm-optimizer
    app.kubernetes.io/part-of: vllm-optimizer
  annotations:
    # 대용량 응답 (SSE 스트림) 타임아웃 증가
    haproxy.router.openshift.io/timeout: "3600s"
    # SSE 버퍼링 비활성화
    haproxy.router.openshift.io/response-buffering: "false"
    # 연결 유지
    router.openshift.io/cookie_name: "vllm-optimizer-sticky"
    # HSTS 헤더
    haproxy.router.openshift.io/hsts_header: "max-age=31536000;includeSubDomains;preload"
spec:
  # 실제 클러스터 도메인으로 수정
  to:
    kind: Service
    name: vllm-optimizer-frontend
    weight: 100
  port:
    targetPort: 4180
  tls:
    # Edge: Route에서 TLS 종료, Pod까지는 HTTP
    termination: edge
    # Reencrypt 옵션: Route→Pod 구간도 TLS (더 안전)
    # termination: reencrypt
    # insecureEdgeTerminationPolicy: Redirect → HTTP를 HTTPS로 자동 리다이렉트
    insecureEdgeTerminationPolicy: Redirect

---
# ── OpenShift Route: Backend API (내부 접근용, 선택사항) ──────────────────────
# Frontend에서 /api/* 프록시 처리하므로 일반적으로 불필요
# 외부 직접 API 접근이 필요한 경우에만 활성화
