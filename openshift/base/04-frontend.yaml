# ═══════════════════════════════════════════════════════════════════════════════
# 04-frontend.yaml
# Frontend Deployment + Service + OpenShift Route (TLS Edge Termination)
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-optimizer-frontend
  labels:
    app: vllm-optimizer-frontend
    app.kubernetes.io/name: vllm-optimizer-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: vllm-optimizer
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-optimizer-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vllm-optimizer-frontend
        app.kubernetes.io/name: vllm-optimizer-frontend
        app.kubernetes.io/part-of: vllm-optimizer
    spec:
      serviceAccountName: vllm-optimizer-frontend
      imagePullSecrets:
        - name: quay-pull-secret

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend
          image: quay.io/joopark/vllm-optimizer-frontend:dev

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          volumeMounts:
            - name: tmp-nginx
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: tmp-nginx
          emptyDir:
            sizeLimit: 50Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 100Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 10Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vllm-optimizer-frontend
                topologyKey: kubernetes.io/hostname

---
# ── Frontend Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vllm-optimizer-frontend
  labels:
    app: vllm-optimizer-frontend
    app.kubernetes.io/part-of: vllm-optimizer
spec:
  selector:
    app: vllm-optimizer-frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# ── OpenShift Route: Edge TLS Termination ─────────────────────────────────────
# OpenShift Router(HAProxy)가 TLS 종료 → HTTP로 Pod에 전달
# Kubernetes Ingress 대신 OpenShift 네이티브 Route 사용
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vllm-optimizer
  labels:
    app.kubernetes.io/name: vllm-optimizer
    app.kubernetes.io/part-of: vllm-optimizer
  annotations:
    # 대용량 응답 (SSE 스트림) 타임아웃 증가
    haproxy.router.openshift.io/timeout: "3600s"
    # SSE 버퍼링 비활성화
    haproxy.router.openshift.io/response-buffering: "false"
    # 연결 유지
    router.openshift.io/cookie_name: "vllm-optimizer-sticky"
    # HSTS 헤더
    haproxy.router.openshift.io/hsts_header: "max-age=31536000;includeSubDomains;preload"
spec:
  # 실제 클러스터 도메인으로 수정
  to:
    kind: Service
    name: vllm-optimizer-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    # Edge: Route에서 TLS 종료, Pod까지는 HTTP
    termination: edge
    # Reencrypt 옵션: Route→Pod 구간도 TLS (더 안전)
    # termination: reencrypt
    # insecureEdgeTerminationPolicy: Redirect → HTTP를 HTTPS로 자동 리다이렉트
    insecureEdgeTerminationPolicy: Redirect

---
# ── OpenShift Route: Backend API (내부 접근용, 선택사항) ──────────────────────
