apiVersion: batch/v1
kind: Job
metadata:
  name: model-download-job
  namespace: vllm
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: model-downloader
        image: registry.access.redhat.com/ubi8/python-39
        command:
        - /bin/bash
        - -c
        - |
          # Install required tools
          pip install --no-cache-dir huggingface-hub
          
          # Create models directory
          mkdir -p /models
          
          # Download the model from Hugging Face
          echo "Downloading Qwen2.5-Coder-3B-Instruct-int4-ov model..."
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Qwen/Qwen2.5-Coder-3B-Instruct-int4-ov',
              local_dir='/models/Qwen2.5-Coder-3B-Instruct-int4-ov',
              local_dir_use_symlinks=False
          )
          echo 'Model download completed successfully!'
          "
          
          # List the downloaded files
          ls -lah /models/Qwen2.5-Coder-3B-Instruct-int4-ov
        volumeMounts:
        - name: models-storage
          mountPath: /models
      volumes:
      - name: models-storage
        persistentVolumeClaim:
          claimName: model-pvc
